<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body style="margin-bottom: 500px;">
    <form>
        <label for="nome">Nome: </label>
        <input name="nome" id="nome" placeholder="
        Digite seu nome" type="text">
        <br><br>

        <label for="senha">senha</label>
        <input type="password" id="senha" name="senha">
        <br><br>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" min="90">
        <br><br>

        <label for="idade">Idade</label>
        <input type="number" name="idade" id="idade">
        <br><br>

        <h3>Cidade</h3>
        <select name="cidade" id="cidade">
            <option value="">Selecione</option>
            <option value="fortaleza">Fortaleza</option>
            <option value="caucaia">Caucaia</option>
            <option value="maracanau">Maracanaú</option>
        </select>

        <h3>Vaga</h3>

        <input type="radio" id="dev" name="vaga" value="dev">
        <label for="dev">Desenvolvedor</label>
        
        <input type="radio" name="vaga" id="qa" value="qa">
        <label for="qa">Qualidade</label>
        
        <input type="radio" name="vaga" id="backend" value="backend">
        <label for="backend">Back-End</label>

        <h3>Linguagens conhecidas</h3>
        
        <input type="checkbox" name="Linguagens" id="python" value="python">
        <label for="python">Python</label>

        <input type="checkbox" name="Linguagens" id="javascript" value="javascript">
        <label for="javascript">JavaScript</label>

        <input type="checkbox" name="Linguagens" id="cpp" value="cpp">
        <label for="cpp">C++</label>
        <br><br>
        
        <label style="display: block;" for="comentario">Comentário</label>
        <textarea placeholder="Digite seu comentario até 500 caracteres" rows="5" cols="20" name="comentario" id="comentario"></textarea>
       

        



        <br><br>
        <input type="submit" value="Enviar" name="enviar" id="enviar">
    </form>
</body>
</html>
